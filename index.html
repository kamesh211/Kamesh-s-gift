<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Sakthi</title>

<link rel="stylesheet" href="style.css">

<style>

.container{

height:100vh;

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;

text-align:center;

}

h1{

font-size:55px;

color:#ff7a90;

text-shadow:
0 0 10px rgba(255,255,255,.9),
0 0 20px rgba(255,182,193,.8);

}

.typing{

overflow:hidden;

white-space:nowrap;

width:0;

font-size:26px;

color:#6b3f2d;

animation:
typing 2s steps(40,end)
forwards;

}

.line2{

animation-delay:2s;

}

.line3{

animation-delay:4s;

}

@keyframes typing{

from{width:0;}

to{width:100%;}

}

.envelope{

font-size:90px;

margin-top:40px;

cursor:pointer;

animation:
float 2s infinite;

}

@keyframes float{

50%{

transform:
translateY(-10px);

}

}

</style>

</head>

<body>

<div class="sparkle" style="top:10%;left:10%;">✨</div>
<div class="sparkle" style="top:15%;right:15%;">🌸</div>
<div class="sparkle" style="bottom:15%;left:20%;">🌷</div>
<div class="sparkle" style="bottom:10%;right:20%;">✨</div>

<div class="container">

<h1>Sakthi 🐈</h1>

<p class="typing">
For the one who loves
</p>

<p class="typing line2">
coffee ☕, tulips 🌷 and cats 🐈
</p>

<p class="typing line3">
A small surprise waits for you 🤍
</p>

<a href="page2.html">

<div class="envelope">
💌
</div>

</a>

<p>Tap the envelope</p>

</div>

</body>

</html>
