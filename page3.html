<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memorable Day</title>

<link rel="stylesheet" href="style.css">

<style>

.container{

height:100vh;

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;

position:relative;

}

.bday{

font-size:48px;

font-weight:bold;

color:#ff7a90;

text-shadow:
0 0 10px rgba(255,255,255,.9),
0 0 20px rgba(255,182,193,.8),
0 0 35px rgba(255,105,180,.6);

margin-bottom:30px;

animation:
glow 2s infinite;

}

@keyframes glow{

50%{

transform:scale(1.05);

}

}

.photo{

width:320px;
height:420px;

overflow:hidden;

border-radius:35px;

border:5px solid rgba(255,255,255,.5);

box-shadow:
0 15px 40px rgba(0,0,0,.25);

animation:
floatPhoto 4s infinite ease-in-out;

}

.photo img{

width:100%;
height:100%;

object-fit:cover;

}

@keyframes floatPhoto{

50%{

transform:
translateY(-12px);

}

}

.flower{

position:absolute;

font-size:35px;

animation:
flowerFloat 3s infinite;

}

@keyframes flowerFloat{

50%{

transform:
translateY(-15px);

}

}

.f1{
top:12%;
left:12%;
}

.f2{
top:18%;
right:15%;
}

.f3{
bottom:18%;
left:18%;
}

.f4{
bottom:12%;
right:15%;
}

</style>

</head>

<body>

<div class="flower f1">🌸</div>
<div class="flower f2">✨</div>
<div class="flower f3">🌷</div>
<div class="flower f4">✨</div>

<div class="container">

<div class="bday">

🎂 Happy Birthday 🎂

</div>

<div class="photo">

<img src="photo1.jpg">

</div>

<br><br>

<a href="page4.html" class="next-btn">

Another Surprise →

</a>

</div>

</body>

</html>
