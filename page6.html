<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Thank You</title>

<link rel="stylesheet" href="style.css">

<style>

.container{

height:100vh;

display:flex;
flex-direction:column;

justify-content:center;
align-items:center;

text-align:center;

padding:20px;

}

.title{

font-size:60px;

color:#ff7a90;

text-shadow:
0 0 10px rgba(255,255,255,.9),
0 0 20px rgba(255,182,193,.8);

margin-bottom:30px;

}

.typing{

overflow:hidden;

white-space:nowrap;

width:0;

font-size:28px;

color:#6b3f2d;

animation:
typing 2s steps(40,end)
forwards;

}

.line2{

animation-delay:2s;

}

@keyframes typing{

from{
width:0;
}

to{
width:100%;
}

}

.icons{

font-size:45px;

margin-top:40px;

animation:
float 2s infinite;

}

@keyframes float{

50%{

transform:
translateY(-10px);

}

}

.end{

margin-top:30px;

font-size:20px;

color:#7a5a4c;

}

</style>

</head>

<body>

<div class="sparkle" style="top:10%;left:10%;">✨</div>
<div class="sparkle" style="top:15%;right:15%;">🌸</div>
<div class="sparkle" style="bottom:15%;left:20%;">🌷</div>
<div class="sparkle" style="bottom:10%;right:20%;">✨</div>

<div class="container">

<h1 class="title">

🤍 Thank You 🤍

</h1>

<p class="typing">

I think and believe

</p>

<p class="typing line2">

it made you happy and brought a smile in your face.

</p>

<div class="icons">

☕ 🌷 🐈 🤍

</div>

<div class="end">

Happy Birthday once again, Sakthiiii ✨

</div>

</div>

</body>

</html>
